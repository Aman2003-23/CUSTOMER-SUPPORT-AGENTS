spring.application.name=demo

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/customer_support_db
spring.datasource.username=postgres
spring.datasource.password=Jgian@2003
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect


app.admin.username=${ADMIN_USERNAME:admin}
app.admin.password=${ADMIN_PASSWORD:admin123}

# Ticket ingest (inbound email webhook)
tickets.ingest.secret=${TICKETS_INGEST_SECRET:}

# Outbound email (SendGrid v3 Mail Send)
app.support.from-address=${SUPPORT_FROM_ADDRESS:support@localhost}
sendgrid.api-key=${SENDGRID_API_KEY:}
sendgrid.enabled=${SENDGRID_ENABLED:false}